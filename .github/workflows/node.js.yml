name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  backend-unit-test:
    name: Backend Unit Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Setup Prisma
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma db push

      - name: Run backend unit tests
        working-directory: backend
        run: npm run test

  integration-test:
    name: Backend Integration Test
    runs-on: ubuntu-latest
    needs: backend-unit-test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      NODE_ENV: test
      PORT: 3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install wait-on
        run: npm install -g wait-on

      - name: Setup Prisma
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma db push

      - name: Start backend
        working-directory: backend
        run: |
          npm run start > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Show backend logs before wait
        working-directory: backend
        run: |
          sleep 10
          cat backend.log || true

      - name: Wait for backend
        run: wait-on http://127.0.0.1:3000 --timeout 60000

      - name: Run integration tests
        working-directory: backend
        run: npm run test:e2e

      - name: Show backend logs on failure
        if: failure()
        working-directory: backend
        run: cat backend.log || true

  playwright-test:
    name: Playwright E2E Test
    runs-on: ubuntu-latest
    needs: integration-test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      NODE_ENV: test
      PORT: 3000
      VITE_API_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install root dependencies
        run: npm ci

      - name: Install wait-on
        run: npm install -g wait-on

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Setup Prisma
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma db push

      - name: Start backend
        working-directory: backend
        run: |
          npm run start > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev -- --host 0.0.0.0 > frontend.log 2>&1 &
          echo $! > frontend.pid
        env:
          VITE_API_URL: http://127.0.0.1:3000

      - name: Show app logs before wait
        run: |
          sleep 15
          echo "===== BACKEND LOG ====="
          cat backend/backend.log || true
          echo "===== FRONTEND LOG ====="
          cat frontend/frontend.log || true

      - name: Wait for backend
        run: wait-on http://127.0.0.1:3000 --timeout 60000

      - name: Wait for frontend
        run: wait-on http://127.0.0.1:5173 --timeout 60000

      - name: Run Playwright tests
        run: npm run test:playwright

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Show logs on failure
        if: failure()
        run: |
          echo "===== BACKEND LOG ====="
          cat backend/backend.log || true
          echo "===== FRONTEND LOG ====="
          cat frontend/frontend.log || true
