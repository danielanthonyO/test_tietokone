name: CI Pipeline

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'e2e/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'e2e/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  backend-tests:
    name: Backend Unit + Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tietokonelepuski_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d tietokonelepuski_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tietokonelepuski_test?schema=public
      JWT_SECRET: test_secret
      FRONTEND_BASE_URL: http://127.0.0.1:5173
      EMAIL_HOST: smtp.example.com
      EMAIL_PORT: 587
      EMAIL_USER: test@example.com
      EMAIL_PASS: testpass
      EMAIL_FROM: noreply@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run backend unit tests
        run: npm test -- --runInBand

      - name: Run backend integration tests
        run: npm run test:e2e -- --runInBand

      - name: Build backend
        run: npm run build --if-present

  playwright-tests:
    name: Full App + Playwright E2E
    runs-on: ubuntu-latest
    needs: backend-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tietokonelepuski_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d tietokonelepuski_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tietokonelepuski_test?schema=public
      JWT_SECRET: test_secret
      BASE_URL: http://127.0.0.1:5173
      FRONTEND_BASE_URL: http://127.0.0.1:5173
      EMAIL_HOST: smtp.example.com
      EMAIL_PORT: 587
      EMAIL_USER: test@example.com
      EMAIL_PASS: testpass
      EMAIL_FROM: noreply@example.com
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: secret123
      WORKER_EMAIL: worker@example.com
      WORKER_PASSWORD: secret123

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start backend
        working-directory: backend
        run: npm run start:dev &

      - name: Start frontend
        working-directory: frontend
        run: npm run dev -- --host 0.0.0.0 &

      - name: Wait for backend
        run: npx wait-on http://127.0.0.1:3000

      - name: Wait for frontend
        run: npx wait-on http://127.0.0.1:5173

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
