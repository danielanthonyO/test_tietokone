integration-test:
  runs-on: ubuntu-latest
  needs: backend-unit-test

  services:
    postgres:
      image: postgres:15
      env:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: testdb
      ports:
        - 5432:5432
      options: >-
        --health-cmd="pg_isready -U postgres"
        --health-interval=10s
        --health-timeout=5s
        --health-retries=5

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install backend deps
      run: |
        cd backend
        npm install

    - name: Install wait-on
      run: npm install -D wait-on

    - name: Setup Prisma
      run: |
        cd backend
        npx prisma generate
        npx prisma db push
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    - name: Start backend
      run: |
        cd backend
        npm run start > backend.log 2>&1 &
        echo $! > backend.pid
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    - name: Print backend logs
      run: |
        cd backend
        sleep 10
        cat backend.log || true

    - name: Wait for backend
      run: npx wait-on http://127.0.0.1:3000 --timeout 60000

    - name: Run integration tests
      run: |
        cd backend
        npm run test:e2e
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
