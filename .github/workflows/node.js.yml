name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Typecheck backend
        working-directory: backend
        run: npm run typecheck

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Run backend unit tests
        working-directory: backend
        run: npm run test:unit
        env:
          CI: true

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci
        env:
          VITE_API_URL: http://localhost:3000
          CI: true

  backend-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-unit]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      JWT_SECRET: test_secret_ci
      JWT_EXPIRES_IN: 7d
      FRONTEND_BASE_URL: http://localhost:5173
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Apply Prisma schema
        working-directory: backend
        run: npx prisma db push
        # Prefer this later if you use committed migrations:
        # run: npx prisma migrate deploy

      - name: Run backend integration tests
        working-directory: backend
        run: npm run test:integration

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-integration, frontend-tests]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      JWT_SECRET: test_secret_ci
      JWT_EXPIRES_IN: 7d
      FRONTEND_BASE_URL: http://localhost:5173
      VITE_API_URL: http://localhost:3000
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install wait-on
        run: npm install -g wait-on

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Apply Prisma schema
        working-directory: backend
        run: npx prisma db push
        # Prefer this later if you use committed migrations:
        # run: npx prisma migrate deploy

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: npm run start:test > ../backend.log 2>&1 &

      - name: Start frontend
        working-directory: frontend
        run: npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &

      - name: Wait for backend and frontend
        run: wait-on http://localhost:3000 http://localhost:5173

      - name: Run browser end-to-end tests
        working-directory: e2e
        run: npm run test

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            e2e/playwright-report
            e2e/test-results
            backend.log
            frontend.log
          if-no-files-found: ignore
